name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-network-dev qt6-sqlite
    
    - name: Build Server
      run: |
        cd ServerChat
        mkdir -p build
        cd build
        cmake ..
        cmake --build . --config Release
    
    - name: Build Client
      run: |
        cd ClientChat
        mkdir -p build
        cd build
        cmake ..
        cmake --build . --config Release
    
    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServerChat
        path: ServerChat/build/ServerChat
    
    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ClientChat
        path: ClientChat/build/ClientChat
