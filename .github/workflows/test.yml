name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-tools-dev
    
    - name: Build and Run Tests
      run: |
        cd tests
        mkdir -p build
        cd build
        cmake ..
        cmake --build .
        ctest --output-on-failure
